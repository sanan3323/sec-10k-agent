# Local dev infrastructure.
#
# Phase 1: Langfuse (observability) + Postgres. The Postgres instance is
# shared — Langfuse uses one database, the application uses another (sec10k)
# with the pgvector extension enabled. One container, two roles.
#
# Phase 7 adds Redis for semantic caching. Don't run it from day one — saves
# RAM and cuts mental overhead.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml down
#
# First-launch note: Langfuse has no LANGFUSE_INIT_* env vars set here, so
# the first time you bring it up you'll need to visit http://localhost:3000,
# create an account, create a project, and copy the public/secret keys into
# your .env file. This is a one-time, ~60-second flow. See README quickstart.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # Application DB. Langfuse creates its own DB on first connect.
      POSTGRES_DB: sec10k
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  langfuse:
    image: langfuse/langfuse:2.92
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-only-not-a-real-secret
      SALT: dev-only-not-a-real-salt
      TELEMETRY_ENABLED: "false"
    restart: unless-stopped

volumes:
  pg_data:
